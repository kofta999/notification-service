services:
  redis:
    image: redis:8.0
    ports:
      - 6379:6379
    volumes:
      - redis_data:/data

  db:
    image: postgres:17
    restart: unless-stopped
    ports:
      - 5432:5432
    env_file:
      - ./config/db.env.example
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d notification_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  prometheus:
    image: prom/prometheus:v3.5.1
    restart: unless-stopped
    network_mode: "host"
    ports:
      - 9090:9090
    volumes:
      - ./config/prometheus/prometheus.dev.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus

  grafana:
    image: grafana/grafana:latest
    restart: unless-stopped
    env_file:
      - ./config/grafana.env.example
    ports:
      - 3001:3000
    depends_on:
      - prometheus
      - loki
    volumes:
      - grafana_data:/var/lib/grafana
      - ./config/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./config/grafana/dashboard-definitions:/var/lib/grafana/dashboards
      - ./config/grafana/datasources:/etc/grafana/provisioning/datasources

  loki:
    image: grafana/loki:latest
    ports:
      - 3100:3100
    restart: unless-stopped
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - loki_data:/loki

volumes:
  redis_data:
  pg_data:
  prometheus_data:
  grafana_data:
  loki_data:
