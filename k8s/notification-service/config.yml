apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
data:
  API_APP_PORT: "3000"
  REAPING_INTERVAL_MINS: "1"
  RECONCILIATION_INTERVAL_MINS: "1"
  REDIS_URL: "redis:6379"
  LOKI_URL: "http://loki:3100"
  QUEUE_PREFIX: redis_mq
  WORKER_NOTI_MAX_RETRIES: "3"
  WORKER_CONCURRENCY: "100"
  WORKER_BACKOFF_EXPONENTIAL_FACTOR: "2"
  WORKER_BACKOFF_BASE_DELAY_MS: "500"
  WORKER_RATE_LIMIT_REQUEUE_DELAY_MS: "1000"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: db-config
data:
  POSTGRES_USER: notification_user
  POSTGRES_PASSWORD: notification_password
  POSTGRES_DB: notification_db
  POSTGRES_HOST: "db"
