apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      # initContainers:
      #   - name: wait-for-db-and-redis
      #     image: busybox:1.36
      #     command:
      #       [
      #         "sh",
      #         "-c",
      #         "until nc -z db-service 5432 && nc -z redis-service 6379; do echo waiting for infrastructure; sleep 2; done;",
      #       ]
      containers:
        - name: worker
          image: notification-service:latest
          command: ["bun"]
          args: ["--filter=worker", "start"]
          ports:
            - containerPort: 9001
          envFrom:
            - configMapRef:
                name: app-config
            - configMapRef:
                name: db-config
