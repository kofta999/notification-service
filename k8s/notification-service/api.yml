apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      # # Requires a serviceAccount that can read jobs to safely replace 'condition: service_completed_successfully'
      # initContainers:
      #   - name: wait-for-db-and-redis
      #     image: busybox:1.36
      #     command:
      #       [
      #         "sh",
      #         "-c",
      #         "until nc -z db-service 5432 && nc -z redis-service 6379; do echo waiting for infrastructure; sleep 2; done;",
      #       ]
      containers:
        - name: api
          image: kofta/notification-service:latest
          command: ["bun"]
          args: ["--filter=api", "start"]
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: app-config
            - configMapRef:
                name: db-config
---
apiVersion: v1
kind: Service
metadata:
  name: api-service
spec:
  type: ClusterIP
  ports:
    - port: 3000
      targetPort: 3000
  selector:
    app: api
