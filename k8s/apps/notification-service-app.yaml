apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: notification-service-app
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1" 
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: 'https://github.com/kofta999/notification-service.git'
    targetRevision: master
    path: k8s/notification-service
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: kofta
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true