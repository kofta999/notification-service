
apiVersion: 1

providers:
  # Provider for notification service dashboards
  - name: 'Notification Service Dashboards'
    orgId: 1
    folder: 'Notification Service'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 10
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: true